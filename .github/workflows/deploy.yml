name: Deploy to Hetzner

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Build KF1 Website
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build KF1 Website
        working-directory: kf1/website
        run: |
          npm ci
          npm run build

      - name: Build KF1 WebAdmin
        working-directory: kf1/webadmin
        run: |
          npm ci
          npm run build

      # Deploy to Hetzner via rsync
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy Hub
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key" \
            hub/ \
            ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:/home/uliunai/hub/

      - name: Deploy KF1 Website
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key" \
            kf1/website/dist/ \
            ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:/home/uliunai/kf1/website/dist/

      - name: Deploy KF1 WebAdmin
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key" \
            kf1/webadmin/dist/ \
            ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:/home/uliunai/kf1/webadmin/dist/
